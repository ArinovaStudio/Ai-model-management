<!DOCTYPE html>
<html>
<head>
    <title>AI Management Voice Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        h2 {
            color: #333;
        }

        #chatbox {
            width: 60%;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 60%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        #response {
            margin-top: 20px;
            font-weight: bold;
            color: #2c3e50;
        }

        #status {
            color: green;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h2>🎤 AI Management Chatbot</h2>

<div id="chatbox">

    <input type="text" id="messageInput" placeholder="Type or Speak..." />

    <br>

    <button onclick="startListening()">🎤 Speak</button>
    <button onclick="sendMessage()">Send</button>

    <p id="status"></p>

    <p><strong>Bot Reply:</strong></p>
    <p id="response"></p>

</div>

<script>

let recognition;

// ----------------------
// Speech Recognition
// ----------------------
function startListening() {

    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Speech Recognition not supported. Please use Google Chrome.");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "en-IN";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.start();

    document.getElementById("status").innerText = "Listening... 🎙";

    recognition.onresult = function (event) {
        const transcript = event.results[0][0].transcript;

        document.getElementById("messageInput").value = transcript;
        document.getElementById("status").innerText = "Speech captured ✔";

        sendMessage();
    };

    recognition.onerror = function (event) {
        document.getElementById("status").innerText = "Error: " + event.error;
    };
}


// ----------------------
// Send Message to Backend
// ----------------------
async function sendMessage() {

    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if (!message) return;

    document.getElementById("status").innerText = "Sending to backend...";

    try {

        const response = await fetch("http://127.0.0.1:8000/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ query: message })
        });

        const data = await response.json();

        document.getElementById("response").innerText = data.reply;
        document.getElementById("status").innerText = "Response received ✔";

    } catch (error) {
        document.getElementById("status").innerText = "Backend error ❌";
        console.error(error);
    }

    input.value = "";
}

</script>

</body>
</html>
